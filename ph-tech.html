<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "phtech-e03b4.firebaseapp.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  signInWithEmailAndPassword(auth, email.value, senha.value)
    .then(() => { alert("Login realizado!"); fecharLogin(); })
    .catch(e => msg.innerText = e.message);
}

window.criarConta = function() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  createUserWithEmailAndPassword(auth, email, senha)
    .then(() => { alert("Conta criada!"); })
    .catch(() => {
      document.getElementById("msg").innerText = "Digite o email e a senha depois clique em Criar conta";
    });
}

window.loginGoogle = function() {
  const provider = new GoogleAuthProvider();
  signInWithPopup(auth, provider)
    .then(res => { alert("Bem-vindo " + res.user.displayName); fecharLogin(); })
    .catch(e => msg.innerText = e.message);
}

window.abrirLogin = () => loginModal.style.display = "flex";
window.fecharLogin = () => loginModal.style.display = "none";
</script>
